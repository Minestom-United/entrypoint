[versions]
minestom = "2026.05.17c-26.1.1"
lombok = "9.5.0"
shadow = "9.4.2"
slf4j = "2.0.18"
spotless = "8.6.0"
adventure = "5.1.1"

[libraries]
minestom = { module = "net.minestom:minestom", version.ref = "minestom" }
minimessage = { module = "net.kyori:adventure-text-minimessage", version.ref = "adventure" }
logging-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
logging-impl = { module = "org.slf4j:slf4j-simple", version.ref = "slf4j" }

[plugins]
lombok = { id = "io.freefair.lombok", version.ref = "lombok" }
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }

